server {
    listen 8080;
    listen [::]:8080;

    root /usr/share/nginx/html;
    index index.html;

    location = /proof {
        try_files /proof/index.html =404;
    }
    location = /proof/ {
        try_files /proof/index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
